<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="theme-color" content="#080808"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>

<title>GymLevel · Steil</title>

<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#080808;color:#fff;font-family:'Barlow',sans-serif;overscroll-behavior:none}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:#FF6B35;border-radius:2px}
#app{max-width:480px;margin:0 auto;min-height:100vh}
.bb{font-family:'Bebas Neue',sans-serif;letter-spacing:2px}
.bc{font-family:'Barlow Condensed',sans-serif}
.card{background:#111;border:1px solid #1C1C1C;border-radius:8px;padding:16px;margin-bottom:10px}
.btn{display:block;width:100%;background:#FF6B35;color:#080808;border:none;cursor:pointer;font-family:'Bebas Neue',sans-serif;letter-spacing:2px;font-size:16px;padding:13px 24px;border-radius:5px;transition:all .15s;text-align:center}
.btn:active{transform:scale(.97)}
.btng{display:block;width:100%;background:transparent;color:#FF6B35;border:1px solid #FF6B3544;cursor:pointer;font-family:'Bebas Neue',sans-serif;letter-spacing:2px;font-size:14px;padding:10px 16px;border-radius:5px;transition:all .15s;text-align:center}
.btng:active{background:#FF6B3511}
.btnsm{width:auto;padding:9px 14px;font-size:13px}
.inp{background:#181818;border:1px solid #252525;color:#fff;border-radius:5px;padding:11px 13px;font-family:'Barlow',sans-serif;font-size:16px;outline:none;width:100%;-webkit-appearance:none}
.inp:focus{border-color:#FF6B35}
.xbar{height:100%;border-radius:3px;transition:width .8s cubic-bezier(.4,0,.2,1)}
#content{padding-bottom:72px;min-height:100vh}
#nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#0A0A0A;border-top:1px solid #181818;display:flex;justify-content:space-around;padding:8px 0 env(safe-area-inset-bottom);z-index:100}
.nav-btn{background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;padding:4px 8px;font-family:'Barlow Condensed',sans-serif;font-size:8px;letter-spacing:2px;color:#333;transition:color .2s}
.nav-btn.active{color:#FF6B35}
/* SESSION */
#sess-ov{position:fixed;inset:0;background:#080808;z-index:200;overflow-y:auto;display:none;flex-direction:column;padding-bottom:130px}
#sess-ov.open{display:flex;flex-direction:column}
#sess-hd{background:#0B0B0B;border-bottom:1px solid #181818;padding:14px 15px 10px;position:sticky;top:0;z-index:10}
/* PICKER */
#picker{position:fixed;inset:0;background:#000000BB;z-index:400;display:none;flex-direction:column;justify-content:flex-end}
#picker.open{display:flex}
#picker-inner{background:#141414;border-radius:14px 14px 0 0;padding:18px 15px;max-height:85vh;overflow-y:auto}
/* REST */
#rest{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#0D0D0D;border:1px solid #FF6B3555;border-radius:12px;padding:14px 20px;z-index:300;display:none;align-items:center;gap:14px;min-width:240px;box-shadow:0 8px 32px #000}
#rest.open{display:flex}
/* NUMPAD */
#numpad{position:fixed;inset:0;background:#000000CC;z-index:600;display:none;flex-direction:column;justify-content:flex-end}
#numpad.open{display:flex}
#np-inner{background:#141414;border-radius:18px 18px 0 0;padding:16px 12px 28px}
#np-label{font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:3px;text-align:center;margin-bottom:8px;color:#FF6B35}
#np-disp{font-family:'Bebas Neue',sans-serif;font-size:56px;letter-spacing:2px;text-align:center;color:#fff;background:#0D0D0D;border-radius:10px;padding:10px 20px;margin-bottom:14px;min-height:82px;display:flex;align-items:center;justify-content:center;border:1px solid #1E1E1E}
.np-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:10px}
.np-k{background:#1E1E1E;border:none;color:#fff;border-radius:10px;font-family:'Barlow',sans-serif;font-size:26px;font-weight:600;padding:18px 10px;cursor:pointer;transition:background .1s;text-align:center;width:100%}
.np-k:active{background:#2E2E2E}
.np-del{background:#1A0800;color:#FF6B35}
.np-ok{background:#FF6B35;color:#080808;font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:2px;padding:18px;border-radius:10px;border:none;width:100%;cursor:pointer}
.np-ok:active{background:#FF8C5A}
/* VAL BUTTONS */
.vbtn{background:#181818;border:1px solid #252525;color:#fff;border-radius:6px;font-family:'Barlow',sans-serif;font-size:16px;font-weight:600;width:100%;text-align:center;cursor:pointer;height:42px;display:flex;align-items:center;justify-content:center;transition:border-color .15s}
.vbtn:active,.vbtn.hi{border-color:#FF6B35;background:#1E1E1E}
/* MODAL */
#modal{position:fixed;inset:0;background:#000000CC;z-index:700;display:none;align-items:center;justify-content:center;padding:20px}
#modal.open{display:flex}
#modal-inner{background:#141414;border:1px solid #2A2A2A;border-radius:14px;padding:24px;width:100%;max-width:400px}
/* TOAST */
#toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-80px);background:#1A1A1A;border:1px solid #FF6B35;border-radius:8px;padding:12px 20px;z-index:999;transition:transform .3s ease;font-family:'Barlow Condensed',sans-serif;font-size:14px;letter-spacing:1px;white-space:nowrap;pointer-events:none}
#toast.show{transform:translateX(-50%) translateY(0)}
@keyframes su{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.ai{animation:su .24s ease forwards}
@keyframes bpop{0%{transform:scale(.5);opacity:0}70%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}
.bpop{animation:bpop .4s ease forwards}
.sep{height:1px;background:#1C1C1C;margin:12px 0}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.clabel{font-family:'Barlow Condensed',sans-serif;font-size:9px;color:#333;text-align:center}
/* TIPS POPUP */
#tips-pop{position:fixed;inset:0;background:#000000BB;z-index:500;display:none;flex-direction:column;justify-content:flex-end}
#tips-pop.open{display:flex}
#tips-inner{background:#141414;border-radius:14px 14px 0 0;padding:20px 16px 28px;max-height:60vh;overflow-y:auto}
/* CHECK */
.chk{width:20px;height:20px;border:2px solid #333;border-radius:4px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.chk.on{background:#FF6B35;border-color:#FF6B35}
</style>
</head>
<body>
<div id="app">
  <div id="content"></div>
  <nav id="nav">
    <button class="nav-btn active" id="nav-home" onclick="goTab('home')">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>

    </button>

      PROGRAMME
    </button>
  </nav>
</div>

<!-- SESSION OVERLAY -->
<div id="sess-ov">
  <div id="sess-hd">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <div>
        <div class="bb" id="sess-name" style="font-size:20px"></div>
        <div class="bc" id="sess-info" style="font-size:11px;letter-spacing:1px;color:#FF6B35"></div>
      </div>
      <div style="display:flex;gap:7px">
        <button class="btng btnsm" onclick="cancelSess()">✕</button>
        <button class="btn btnsm" onclick="finishSess()">TERMINER</button>
      </div>
    </div>
    <div style="background:#1A1A1A;border-radius:2px;height:3px;overflow:hidden">
      <div id="sess-prog" style="height:100%;background:#FF6B35;transition:width .3s;border-radius:2px;width:0%"></div>
    </div>
  </div>
  <div id="sess-exs" style="padding:12px 13px"></div>
  <div style="padding:0 13px 16px">
    <textarea class="inp" id="sess-notes" placeholder="Notes sur la séance..." rows="2" style="resize:none;font-size:14px;margin-bottom:10px"></textarea>
    <button class="btng" onclick="openPicker()">+ AJOUTER UN EXERCICE</button>
  </div>
</div>

<!-- REST TIMER -->
<div id="rest">
  <div>
    <div class="bc" style="font-size:9px;color:#FF6B35;letter-spacing:3px;margin-bottom:2px">REPOS</div>
    <div class="bb" id="rest-disp" style="font-size:38px;color:#fff;line-height:1">1:30</div>
  </div>
  <div style="display:flex;flex-direction:column;gap:6px">
    <div style="display:flex;gap:5px">
      <button onclick="setRest(60)"  class="bc" style="background:#1A1A1A;border:1px solid #252525;color:#888;border-radius:4px;padding:4px 8px;cursor:pointer;font-size:11px">1'</button>
      <button onclick="setRest(90)"  class="bc" style="background:#1A1A1A;border:1px solid #252525;color:#888;border-radius:4px;padding:4px 8px;cursor:pointer;font-size:11px">1'30</button>
      <button onclick="setRest(120)" class="bc" style="background:#1A1A1A;border:1px solid #252525;color:#888;border-radius:4px;padding:4px 8px;cursor:pointer;font-size:11px">2'</button>
      <button onclick="setRest(180)" class="bc" style="background:#1A1A1A;border:1px solid #252525;color:#888;border-radius:4px;padding:4px 8px;cursor:pointer;font-size:11px">3'</button>
    </div>
    <button onclick="closeRest()" class="bc" style="background:#FF6B35;border:none;color:#080808;border-radius:4px;padding:5px;cursor:pointer;font-size:11px;letter-spacing:1px">SKIP ›</button>
  </div>
</div>

<!-- NUMPAD -->
<div id="numpad">
  <div id="np-inner">
    <div id="np-label">POIDS (KG)</div>
    <div id="np-disp">0</div>
    <div class="np-grid">
      <button class="np-k" onclick="npK('7')">7</button>
      <button class="np-k" onclick="npK('8')">8</button>
      <button class="np-k" onclick="npK('9')">9</button>
      <button class="np-k" onclick="npK('4')">4</button>
      <button class="np-k" onclick="npK('5')">5</button>
      <button class="np-k" onclick="npK('6')">6</button>
      <button class="np-k" onclick="npK('1')">1</button>
      <button class="np-k" onclick="npK('2')">2</button>
      <button class="np-k" onclick="npK('3')">3</button>
      <button class="np-k" style="color:#888;font-size:20px" onclick="npK('.')">•</button>
      <button class="np-k" onclick="npK('0')">0</button>
      <button class="np-k np-del" onclick="npDel()">⌫</button>
    </div>
    <button class="np-ok" onclick="npOK()">VALIDER</button>
  </div>
</div>

<!-- TIPS POPUP -->
<div id="tips-pop">
  <div id="tips-inner"></div>
</div>

<!-- PICKER -->
<div id="picker"><div id="picker-inner"></div></div>

<!-- MODAL -->
<div id="modal"><div id="modal-inner"></div></div>

<!-- TOAST -->
<div id="toast"></div>

function loadDB(){
  try{
    // Migration : récupère les données des versions précédentes
    var EMPTY = {xp:0,workouts:[],streak:0,lastWorkout:null,weights:[],prs:{},prCount:0,totalTon:0,badges:[],claimed:{},weekPR:false,dropCount:0,nutrition:{},supps:{},gr_check:{},daily:{}};
    var d = localStorage.getItem("steil5");
    if(d){ db=Object.assign({},EMPTY,JSON.parse(d)); return; }
    // Essaie les anciennes clés dans l'ordre
    var oldKeys = ["steil4","steil3","steil_gym3","steil_gym2","steil_gym"];
    for(var i=0;i<oldKeys.length;i++){
      var old = localStorage.getItem(oldKeys[i]);
      if(old){
        try{
          var p = JSON.parse(old);
          // Adapte les anciens champs (w/r -> w/r, n -> n, etc.)
          db = Object.assign({},EMPTY,p);
          // Recalcule totalTon si absent
          if(!db.totalTon){
            db.totalTon = db.workouts.reduce(function(a,w){return a+(w.ton||w.tonnage||0);},0);
          }
          // Normalise les exercices (anciens champs name->n, tip->t, sets weight->w, reps->r)
          for(var wi=0;wi<db.workouts.length;wi++){
            var w=db.workouts[wi];
            // Normalise sessionType -> st
            if(w.sessionType&&!w.st) w.st=w.sessionType;
            // Normalise tonnage -> ton
            if(w.tonnage&&!w.ton) w.ton=w.tonnage;
            for(var ei=0;ei<w.exercises.length;ei++){
              var ex=w.exercises[ei];
              // Ancien format : name, tip
              if(ex.name&&!ex.n) ex.n=ex.name;
              if(ex.tip&&!ex.t) ex.t=ex.tip;
              for(var si=0;si<ex.sets.length;si++){
                var s=ex.sets[si];
                // Ancien format : weight->w, reps->r
                if(s.weight!==undefined&&s.w===undefined) s.w=s.weight;
                if(s.reps!==undefined&&s.r===undefined) s.r=s.reps;
              }
            }
          }
          // Normalise les PRs (anciens exercices en nom long)
          if(p.prs) db.prs=p.prs;
          localStorage.setItem("steil5",JSON.stringify(db));
          console.log("Migration depuis "+oldKeys[i]+" effectuée");
          return;
        }catch(e){ console.log("Erreur migration",e); }
      }
    }
  }catch(e){}
}
function saveDB(){ try{localStorage.setItem("steil5",JSON.stringify(db));}catch(e){} }
loadDB();

function xpPerLv(l){ return 600+l*250; }
function getLevel(xp){ var l=1,r=xp; while(r>=xpPerLv(l)){r-=xpPerLv(l);l++;} return{level:l,rem:r,need:xpPerLv(l)}; }
function calcXP(sets){ return sets.reduce(function(a,s){return a+Math.round(((s.w||1)*(s.r||1)*0.12)+(s.drop&&s.drop.done?(s.drop.w||1)*(s.drop.r||1)*0.08:0));},0); }
function calcTon(sets){ return sets.reduce(function(a,s){return a+(s.w||0)*(s.r||0)+(s.drop&&s.drop.done?(s.drop.w||0)*(s.drop.r||0):0);},0); }
function weekW(){ return db.workouts.filter(function(w){return (Date.now()-new Date(w.date).getTime())<7*86400000;}); }
function prevWeekW(){ return db.workouts.filter(function(w){var d=Date.now()-new Date(w.date).getTime();return d>=7*86400000&&d<14*86400000;}); }
function todayKey(){ return new Date().toDateString(); }
function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmt(n){ return n%1===0?String(n):n.toFixed(1); }

function togDaily(id){
  var dk=todayKey();
  if(!db.daily[dk]) db.daily[dk]=[];

  if(idx>=0){ db.daily[dk].splice(idx,1); }

function claimQ(id,xp){

  saveDB(); showToast('+'+xp+' XP · Quête réclamée !'); render();
}

function getLastW(exName){
  for(var i=0;i<db.workouts.length;i++){
    var w=db.workouts[i];
    for(var j=0;j<w.exercises.length;j++){
      if(w.exercises[j].n===exName&&w.exercises[j].sets.length){ return w.exercises[j].sets[0].w||20; }
    }
  }
  return 20;
}
function mkSets(exName, st){
  if(st==='CARDIO MATIN' && CARDIO_EX[exName]){
    var s={cardio:true,done:false};
    if(exName==='Marche rapide tapis'){s.duree=20;s.vitesse=3.2;s.incl=8;}
    else if(exName==='Escalier'){s.duree=20;s.niveau=8;s.marches=1451;}
    else if(exName==='Course tapis'){s.duree=20;s.vitesse=6.5;}
    return [s];
  }
  var w=getLastW(exName); return [{w:w,r:10,done:false},{w:w,r:10,done:false},{w:w,r:10,done:false}];
}

function startScheduled(){
  var sc=SCHED[new Date().getDay()]; if(!sc)return;
  var exs=[]; var src=SEX[sc.label]||[];
  for(var i=0;i<src.length;i++) exs.push({n:src[i].n,t:src[i].t,sets:mkSets(src[i].n, sc.label)});
  startSess(sc.label+' · '+new Date().toLocaleDateString('fr-FR',{weekday:'long'}),sc.label,exs);
}
function startFree(){startSess('Séance libre','libre',[]);}
function copySess(idx){
  var w=db.workouts[idx]; if(!w)return;
  var exs=[];
  for(var i=0;i<w.exercises.length;i++){
    var ex=w.exercises[i], sets=[];
    for(var j=0;j<ex.sets.length;j++) sets.push({w:ex.sets[j].w,r:ex.sets[j].r,done:false});
    exs.push({n:ex.n,t:ex.t||'',sets:sets});
  }
  startSess(w.st+' · copie du '+new Date(w.date).toLocaleDateString('fr-FR'),w.st,exs);
}

function startSess(name,type,exs){
  session={name:name,st:type,exercises:exs,t0:Date.now()};
  document.getElementById('sess-ov').classList.add('open');
  document.getElementById('sess-name').textContent=name;
  document.getElementById('sess-notes').value='';
  updateSessUI();
  if(timerIv)clearInterval(timerIv);
  timerIv=setInterval(function(){
    if(!session)return;
    var s=Math.floor((Date.now()-session.t0)/1000);
    elapsed=Math.floor(s/60)+':'+(s%60<10?'0':'')+s%60;
    updateSessInfo();
  },1000);
}

function updateSessInfo(){
  if(!session)return;
  var total=0,done=0,xpv=0,ton=0;
  for(var i=0;i<session.exercises.length;i++){
    var ex=session.exercises[i];
    for(var j=0;j<ex.sets.length;j++){
      total++;
      if(ex.sets[j].done){done++;xpv+=Math.round((ex.sets[j].w||1)*(ex.sets[j].r||1)*0.12);ton+=(ex.sets[j].w||0)*(ex.sets[j].r||0);}
      if(ex.sets[j].drop&&ex.sets[j].drop.done){xpv+=Math.round((ex.sets[j].drop.w||1)*(ex.sets[j].drop.r||1)*0.08);ton+=(ex.sets[j].drop.w||0)*(ex.sets[j].drop.r||0);}
    }
  }
  document.getElementById('sess-info').textContent='⏱ '+elapsed+' · '+done+'/'+total+' · +'+xpv+' XP · '+Math.round(ton)+' kg';
  document.getElementById('sess-prog').style.width=(total>0?Math.round(done/total*100):0)+'%';
}

function updateSessUI(){
  if(!session)return;
  updateSessInfo();
  var c=document.getElementById('sess-exs');
  if(!session.exercises.length){
    c.innerHTML='<div style="text-align:center;padding:40px 20px"><div class="bb" style="font-size:18px;color:#2A2A2A;letter-spacing:2px">AJOUTE DES EXERCICES</div></div>';
    return;
  }
  var html='';
  for(var ei=0;ei<session.exercises.length;ei++){
    var ex=session.exercises[ei];
    var exPR=db.prs[ex.n]||0;
    var curMax=0;
    for(var si=0;si<ex.sets.length;si++) if(ex.sets[si].done&&(ex.sets[si].w||0)>curMax) curMax=ex.sets[si].w||0;
    var isPR=curMax>0&&curMax>exPR;
    var hasTip=!!TIPS[ex.n];
    html+='<div class="card ai" style="margin-bottom:10px'+(isPR?';border-color:#FFE66D40':'')+'">';
    // Header
    html+='<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">';
    html+='<div style="flex:1"><div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">';
    html+='<div class="bb" style="font-size:16px;letter-spacing:1px">'+esc(ex.n)+'</div>';
    if(isPR) html+='<span class="bc" style="font-size:9px;color:#FFE66D;border:1px solid #FFE66D44;border-radius:3px;padding:2px 5px;letter-spacing:1px">🏆 PR</span>';
    if(exPR>0) html+='<span class="bc" style="font-size:9px;color:#3A3A3A">PR: '+exPR+' kg</span>';
    html+='</div>';
    if(ex.t) html+='<div style="font-size:11px;color:#3A3A3A;margin-top:2px">'+esc(ex.t)+'</div>';
    html+='</div>';
    html+='<div style="display:flex;gap:6px;align-items:center">';
    if(hasTip) html+='<button onclick="showTips('+ei+')" style="background:none;border:1px solid #2A2A2A;color:#555;border-radius:4px;cursor:pointer;padding:4px 7px;font-size:10px;font-family:Barlow Condensed,sans-serif;letter-spacing:1px">TIPS</button>';
    html+='<button onclick="rmEx('+ei+')" style="background:none;border:none;color:#2A2A2A;cursor:pointer;padding:4px;font-size:16px">✕</button>';
    html+='</div></div>';
    // Column headers (muscu only)
    var isCardioSess = session.st==='CARDIO MATIN';
    if(!isCardioSess){
      html+='<div style="display:grid;grid-template-columns:26px 1fr 1fr 38px;gap:7px;margin-bottom:6px">';
      html+='<div class="bc" style="font-size:9px;color:#2A2A2A;letter-spacing:1px;text-align:center">#</div>';
      html+='<div class="bc" style="font-size:9px;color:#2A2A2A;letter-spacing:1px;text-align:center">KG</div>';
      html+='<div class="bc" style="font-size:9px;color:#2A2A2A;letter-spacing:1px;text-align:center">REPS</div>';
      html+='<div></div></div>';
    }
    // Sets
    for(var si2=0;si2<ex.sets.length;si2++){
      var set=ex.sets[si2];
      // ── CARDIO BLOCK ──
      if(set.cardio){
        var fields=CARDIO_EX[ex.n]||[];
        var cols=fields.length;
        html+='<div style="background:#0D0D0D;border:1px solid '+(set.done?'#38BDF840':'#1C1C1C')+';border-radius:8px;padding:12px;margin-bottom:10px">';
        html+='<div style="display:grid;grid-template-columns:repeat('+cols+',1fr);gap:8px;margin-bottom:12px">';
        for(var fi=0;fi<fields.length;fi++){
          var fd=fields[fi], fval=set[fd.k]!==undefined?set[fd.k]:0;
          html+='<div style="text-align:center">';
          html+='<div class="bc" style="font-size:9px;color:#38BDF8;letter-spacing:2px;margin-bottom:5px">'+fd.label+'</div>';
          html+='<button class="vbtn" style="border-color:#38BDF820;font-size:18px" onclick="openNP_cardio('+ei+','+si2+',\''+fd.k+'\')">';
          html+=fmt(fval)+(fd.unit?'<span style="font-size:11px;color:#444;margin-left:3px">'+fd.unit+'</span>':'');
          html+='</button></div>';
        }
        html+='</div>';
        html+='<button onclick="togSet('+ei+','+si2+')" style="width:100%;background:'+(set.done?'#38BDF820':'#181818')+';border:1px solid '+(set.done?'#38BDF8':'#252525')+';border-radius:6px;padding:10px;cursor:pointer;font-family:Bebas Neue,sans-serif;letter-spacing:2px;font-size:14px;color:'+(set.done?'#38BDF8':'#444')+'">'+( set.done?'✓ TERMINÉ':'MARQUER COMME TERMINÉ')+'</button>';
        html+='</div>';
        continue;
      }
      // Main phase
      html+='<div style="display:grid;grid-template-columns:26px 1fr 1fr 38px;gap:7px;align-items:center;margin-bottom:'+(set.drop?'4px':'8px')+';opacity:'+(set.done?.5:1)+'">';
      html+='<div class="bb" style="font-size:15px;color:#333;text-align:center">'+(si2+1)+'</div>';
      html+='<button class="vbtn" onclick="openNP('+ei+','+si2+',\'w\',false)">'+fmt(set.w||0)+' kg</button>';
      html+='<button class="vbtn" onclick="openNP('+ei+','+si2+',\'r\',false)">'+( set.r||0)+' reps</button>';
      html+='<button onclick="togSet('+ei+','+si2+')" style="background:'+(set.done?'#FF6B35':'#181818')+';border:1px solid '+(set.done?'#FF6B35':'#252525')+';border-radius:5px;height:38px;width:38px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;font-size:15px">'+(set.done?'<span style="color:#080808">✓</span>':'<span style="color:#2A2A2A">✓</span>')+'</button>';
      html+='</div>';
      // Drop set phase
      if(set.drop){
        html+='<div style="display:grid;grid-template-columns:26px 1fr 1fr 38px;gap:7px;align-items:center;margin-bottom:8px;opacity:'+(set.drop.done?.5:1)+'">';
        html+='<div style="font-size:10px;color:#C77DFF;text-align:center">↓</div>';
        html+='<button class="vbtn" style="border-color:#C77DFF33" onclick="openNP('+ei+','+si2+',\'w\',true)">'+fmt(set.drop.w||0)+' kg</button>';
        html+='<button class="vbtn" style="border-color:#C77DFF33" onclick="openNP('+ei+','+si2+',\'r\',true)">'+( set.drop.r||0)+' reps</button>';
        html+='<button onclick="togDrop('+ei+','+si2+')" style="background:'+(set.drop.done?'#C77DFF':'#181818')+';border:1px solid '+(set.drop.done?'#C77DFF':'#252525')+';border-radius:5px;height:38px;width:38px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;font-size:15px">'+(set.drop.done?'<span style="color:#080808">✓</span>':'<span style="color:#2A2A2A">✓</span>')+'</button>';
        html+='</div>';
      } else {
        html+='<button onclick="addDrop('+ei+','+si2+')" style="background:none;border:none;color:#3A3A3A;cursor:pointer;font-family:Barlow Condensed,sans-serif;font-size:10px;letter-spacing:1px;margin-bottom:8px;padding:0 0 0 33px;display:block">+ DROP SET</button>';
      }
    }
    if(!isCardioSess) html+='<button class="btng" style="margin-top:2px;font-size:12px;padding:7px 12px" onclick="addSet('+ei+')">+ SÉRIE</button>';
    html+='</div>';
  }
  c.innerHTML=html;
}

function rmEx(ei){session.exercises.splice(ei,1);updateSessUI();}
function togSet(ei,si){
  session.exercises[ei].sets[si].done=!session.exercises[ei].sets[si].done;
  if(session.exercises[ei].sets[si].done) startRest(90);
  updateSessUI();
}
function togDrop(ei,si){
  var d=session.exercises[ei].sets[si].drop;
  if(d){d.done=!d.done;if(d.done)startRest(60);}
  updateSessUI();
}
function addDrop(ei,si){
  var set=session.exercises[ei].sets[si];
  set.drop={w:Math.round((set.w||20)*0.7),r:12,done:false};
  updateSessUI();
}
function addSet(ei){
  var last=session.exercises[ei].sets[session.exercises[ei].sets.length-1];
  session.exercises[ei].sets.push({w:last.w,r:last.r,done:false});
  updateSessUI();
}
function addExToSess(ci,xi){
  var cats=Object.keys(ALL_EX), cat=cats[ci], exName=ALL_EX[cat][xi];
  session.exercises.push({n:exName,t:'',sets:mkSets(exName)});
  closePicker();updateSessUI();
}
function addSessEx(exName,tip){
  session.exercises.push({n:exName,t:tip||'',sets:mkSets(exName)});
  closePicker();updateSessUI();
}

function showTips(ei){
  var ex=session.exercises[ei], tip=TIPS[ex.n];
  if(!tip)return;
  document.getElementById('tips-inner').innerHTML=
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">'
    +'<div class="bb" style="font-size:18px;letter-spacing:2px">'+esc(ex.n)+'</div>'
    +'<button onclick="closeTips()" style="background:none;border:none;color:#666;cursor:pointer;font-size:22px">✕</button></div>'
    +'<div style="margin-bottom:12px"><div class="bc" style="font-size:9px;color:#FF6B35;letter-spacing:3px;margin-bottom:6px">MUSCLES CIBLÉS</div><div style="font-size:13px;color:#ccc">'+esc(tip.m)+'</div></div>'
    +'<div style="margin-bottom:12px"><div class="bc" style="font-size:9px;color:#4ECDC4;letter-spacing:3px;margin-bottom:6px">EXÉCUTION</div><div style="font-size:13px;color:#ccc;line-height:1.5">'+esc(tip.e)+'</div></div>'
    +'<div style="margin-bottom:12px"><div class="bc" style="font-size:9px;color:#FFE66D;letter-spacing:3px;margin-bottom:6px">ERREURS FRÉQUENTES</div><div style="font-size:13px;color:#888;line-height:1.5">'+esc(tip.err)+'</div></div>'
    +'<div style="margin-bottom:4px"><div class="bc" style="font-size:9px;color:#6FCF97;letter-spacing:3px;margin-bottom:6px">PROGRESSION</div><div style="font-size:13px;color:#6FCF97;line-height:1.5">'+esc(tip.p)+'</div></div>';
  document.getElementById('tips-pop').classList.add('open');
}
function closeTips(){document.getElementById('tips-pop').classList.remove('open');}

function cancelSess(){if(!confirm('Abandonner la séance ?'))return;endSess();}
function finishSess(){
  if(!session)return;
  var notes=document.getElementById('sess-notes').value||'';
  var allSets=session.exercises.flatMap?session.exercises.flatMap(function(e){return e.sets;}):[];
  if(!session.exercises.flatMap){
    allSets=[];
    for(var i=0;i<session.exercises.length;i++) for(var j=0;j<session.exercises[i].sets.length;j++) allSets.push(session.exercises[i].sets[j]);
  }
  var doneSets=allSets.filter(function(s){return s.done;});
  var xpG=calcXP(doneSets), ton=calcTon(doneSets);
  // Drop count
  var drops=allSets.filter(function(s){return s.drop&&s.drop.done;}).length;
  if(drops>0) db.dropCount=(db.dropCount||0)+drops;
  // PR check
  var newPRs=[];
  for(var ei=0;ei<session.exercises.length;ei++){
    var ex=session.exercises[ei], max=0;
    for(var si=0;si<ex.sets.length;si++) if(ex.sets[si].done&&(ex.sets[si].w||0)>max) max=ex.sets[si].w||0;
    if(max>0&&max>(db.prs[ex.n]||0)){db.prs[ex.n]=max;db.prCount=(db.prCount||0)+1;db.weekPR=true;newPRs.push(ex.n);}
  }
  // Streak
  var todS=new Date().toDateString(),lastS=db.lastWorkout?new Date(db.lastWorkout).toDateString():null,yestS=new Date(Date.now()-86400000).toDateString();
  var streak=(lastS===yestS||lastS===todS)?db.streak+(lastS===todS?0:1):1;
  db.workouts.unshift({id:Date.now(),date:new Date().toISOString(),name:session.name,st:session.st,exercises:session.exercises,xpGained:xpG,ton:ton,duration:Math.round((Date.now()-session.t0)/60000),notes:notes});
  db.workouts=db.workouts.slice(0,150);
  db.xp+=xpG;db.streak=streak;db.lastWorkout=new Date().toISOString();db.totalTon=(db.totalTon||0)+ton;
  saveDB();closeRest();checkBadges();
  if(newPRs.length) showToast('🏆 '+newPRs.length+' nouveau'+(newPRs.length>1?'x':'')+' record'+(newPRs.length>1?'s':'')+'!');
  endSess();
}
function endSess(){
  clearInterval(timerIv);session=null;elapsed='0:00';
  document.getElementById('sess-ov').classList.remove('open');
  closeRest();render();
}

function openNP_cardio(ei,si,fk){
  np.ei=ei;np.si=si;np.f=fk;np.drop=false;np.cardio=true;
  var cur=session.exercises[ei].sets[si][fk];
  np.val=String(cur!==undefined?cur:'0');
  var labels={duree:'DURÉE (MIN)',vitesse:'VITESSE (KM/H)',incl:'INCLINAISON (%)',niveau:'NIVEAU',marches:'MARCHES'};
  document.getElementById('np-label').textContent=labels[fk]||fk.toUpperCase();
  document.getElementById('np-disp').textContent=np.val;
  document.getElementById('numpad').classList.add('open');
}
function openNP(ei,si,f,isDrop){
  np.ei=ei;np.si=si;np.f=f;np.drop=isDrop;np.cardio=false;
  var cur=isDrop?session.exercises[ei].sets[si].drop[f]:session.exercises[ei].sets[si][f];
  np.val=String(cur||'0');
  document.getElementById('np-label').textContent=isDrop?'DROP · '+(f==='w'?'POIDS (KG)':'REPS'):(f==='w'?'POIDS (KG)':'REPS');
  document.getElementById('np-disp').textContent=np.val;
  document.getElementById('numpad').classList.add('open');
}
function npK(k){
  if(k==='.'&&np.val.indexOf('.')>=0) return;
  if(k==='.'&&!np.cardio&&np.f==='r') return; // no decimal for reps (non-cardio)
  if(k==='.'&&np.cardio&&(np.f==='marches'||np.f==='niveau')) return; // no decimal for marches/niveau
  if(np.val==='0'&&k!=='.') np.val=k;
  else np.val+=k;
  if(np.val.length>6) np.val=np.val.slice(0,6);
  document.getElementById('np-disp').textContent=np.val;
}
function npDel(){
  np.val=np.val.slice(0,-1)||'0';
  document.getElementById('np-disp').textContent=np.val;
}
function npOK(){
  var val=parseFloat(np.val)||0;
  if(np.cardio){
    // no rounding for cardio, keep decimal for vitesse/incl
    if(np.f==='marches'||np.f==='niveau') val=Math.round(val);
    session.exercises[np.ei].sets[np.si][np.f]=val;
    np.cardio=false;
  } else if(np.drop){
    if(np.f==='r') val=Math.round(val);
    session.exercises[np.ei].sets[np.si].drop[np.f]=val;
  } else {
    if(np.f==='r') val=Math.round(val);
    session.exercises[np.ei].sets[np.si][np.f]=val;
  }
  document.getElementById('numpad').classList.remove('open');
  np.val='';
  updateSessUI();
}

function renderStats(){
  var lastW=db.weights.length?db.weights[0].weight:PROFILE.startWeight;
  var wk=weekW(), pw=prevWeekW();
  var wkTon=wk.reduce(function(a,w){return a+(w.ton||0);},0);
  var pwTon=pw.reduce(function(a,w){return a+(w.ton||0);},0);
  var wkXP=wk.reduce(function(a,w){return a+(w.xpGained||0);},0);
  var pwXP=pw.reduce(function(a,w){return a+(w.xpGained||0);},0);
  var fatigue='OK';
  if(wkTon>pwTon*1.25&&pw.length>0) fatigue='⚠️ VOLUME ÉLEVÉ · Récupère bien';
  else if(wk.length>=5) fatigue='🔥 EXCELLENTE SEMAINE';
  else if(wk.length<=1&&pw.length>2) fatigue='😴 SEMAINE LÉGÈRE';

  var topPRs=Object.keys(db.prs).map(function(k){return{n:k,v:db.prs[k]};}).sort(function(a,b){return b.v-a.v;}).slice(0,5);
  var mmap={};
  for(var i=0;i<Math.min(20,db.workouts.length);i++){var m=MUSCLES[db.workouts[i].st];if(m){var ks=Object.keys(m);for(var k=0;k<ks.length;k++) mmap[ks[k]]=(mmap[ks[k]]||0)+m[ks[k]];}}
  var mentries=Object.keys(mmap).map(function(k){return[k,mmap[k]];}).sort(function(a,b){return b[1]-a[1];}).slice(0,6);
  var mmax=mentries.length?mentries[0][1]:1;

  var html='<div class="ai" style="padding:24px 14px"><div class="bb" style="font-size:34px;letter-spacing:3px;margin-bottom:16px">STATISTIQUES</div>';

  // Fatigue indicator
  html+='<div class="card" style="background:#0D0D0D;margin-bottom:10px"><div class="bc" style="font-size:9px;color:#555;letter-spacing:3px;margin-bottom:6px">ÉTAT DE FORME</div><div class="bc" style="font-size:14px;color:#ccc">'+fatigue+'</div></div>';

  // Weekly comparison
  html+='<div class="card" style="margin-bottom:10px"><div class="bc" style="font-size:9px;color:#4ECDC4;letter-spacing:3px;margin-bottom:12px">CETTE SEMAINE VS PRÉCÉDENTE</div>';
  html+='<div class="g3">';
  html+=statCmp('SÉANCES',wk.length,pw.length,'');
  html+=statCmp('XP',wkXP,pwXP,'');
  html+=statCmp('TONNAGE',Math.round(wkTon),Math.round(pwTon),' kg');
  html+='</div></div>';

  // Big numbers
  html+='<div class="g2" style="margin-bottom:10px">'
    +'<div class="card" style="text-align:center;padding:14px 8px;margin-bottom:0"><div class="bb" style="font-size:20px;color:#FF6B35;line-height:1">'+Math.round(db.totalTon||0).toLocaleString('fr-FR')+'</div><div class="bc" style="font-size:9px;color:#3A3A3A;letter-spacing:1.5px;margin-top:4px">KG SOULEVÉS</div></div>'
    +'<div class="card" style="text-align:center;padding:14px 8px;margin-bottom:0"><div class="bb" style="font-size:20px;color:#FFE66D;line-height:1">'+(db.prCount||0)+'</div><div class="bc" style="font-size:9px;color:#3A3A3A;letter-spacing:1.5px;margin-top:4px">RECORDS BATTUS</div></div>'
    +'</div>';

  // XP chart
  html+='<div class="card"><div class="bc" style="font-size:9px;color:#444;letter-spacing:3px;margin-bottom:12px">XP PAR SÉANCE</div><div style="display:flex;align-items:flex-end;gap:5px;height:80px" id="xp-chart"></div></div>';

  // Weight chart
  html+='<div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><div class="bc" style="font-size:9px;color:#4ECDC4;letter-spacing:3px">ÉVOLUTION POIDS</div><div class="bb" style="font-size:13px;color:#4ECDC4">'+lastW+' → OBJ '+PROFILE.goalWeight+' kg</div></div><div style="display:flex;align-items:flex-end;gap:5px;height:80px" id="w-chart"></div></div>';

  // Muscles
  if(mentries.length){
    html+='<div class="card"><div class="bc" style="font-size:9px;color:#C77DFF;letter-spacing:3px;margin-bottom:14px">MUSCLES LES PLUS TRAVAILLÉS</div>';
    for(var mi=0;mi<mentries.length;mi++){
      var mpct=Math.round((mentries[mi][1]/mmax)*100);
      html+='<div style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;margin-bottom:4px"><span class="bc" style="font-size:12px;color:#ccc">'+mentries[mi][0]+'</span><span class="bc" style="font-size:10px;color:#555">'+mpct+'%</span></div><div style="background:#181818;border-radius:2px;height:5px;overflow:hidden"><div style="height:100%;width:'+mpct+'%;background:linear-gradient(90deg,#C77DFF,#9B5DE5);border-radius:2px;transition:width .6s ease"></div></div></div>';
    }
    html+='</div>';
  }

  // Top PRs
  if(topPRs.length){
    html+='<div class="card"><div class="bc" style="font-size:9px;color:#FFE66D;letter-spacing:3px;margin-bottom:12px">RECORDS PERSONNELS 🏆</div>';
    for(var pi=0;pi<topPRs.length;pi++) html+='<div style="display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid #181818"><div style="display:flex;align-items:center;gap:8px"><div class="bb" style="font-size:13px;color:#FFE66D;width:20px">'+(pi+1)+'</div><div style="font-size:13px;color:#ccc">'+esc(topPRs[pi].n)+'</div></div><div class="bb" style="font-size:16px;color:#FFE66D">'+topPRs[pi].v+' KG</div></div>';
    html+='</div>';
  }

  // Prog per exercise
  html+='<div class="card"><div class="bc" style="font-size:9px;color:#444;letter-spacing:3px;margin-bottom:10px">PROGRESSION POIDS MAX</div><div id="ex-filter" style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px"></div><div style="display:flex;align-items:flex-end;gap:5px;height:70px" id="prog-chart"></div></div>';

  // History
  if(!db.workouts.length){
    html+='<div class="card" style="text-align:center;padding:44px"><div class="bb" style="font-size:18px;color:#2A2A2A;letter-spacing:2px">AUCUNE SÉANCE ENCORE</div></div>';
  } else {
    html+='<div class="bc" style="font-size:9px;color:#2A2A2A;letter-spacing:3px;margin-bottom:8px">HISTORIQUE</div>';
    for(var wi=0;wi<db.workouts.length;wi++){
      var w=db.workouts[wi], wc=SCHED[new Date(w.date).getDay()]?SCHED[new Date(w.date).getDay()].color:'#444';
      html+='<div class="card" style="margin-bottom:7px;border-left:3px solid '+wc+';padding-left:14px"><div style="display:flex;justify-content:space-between;align-items:center"><div><div class="bb" style="font-size:15px;letter-spacing:1px;color:'+wc+'">'+esc(w.name)+'</div><div style="display:flex;gap:8px;margin-top:2px;flex-wrap:wrap"><span class="bc" style="font-size:10px;color:#333">'+w.exercises.length+' ex.</span><span class="bc" style="font-size:10px;color:#333">'+w.duration+' min</span><span class="bc" style="font-size:10px;color:#333">'+Math.round(w.ton||0)+' kg</span><span class="bc" style="font-size:10px;color:#333">'+new Date(w.date).toLocaleDateString('fr-FR')+'</span></div>'+(w.notes?'<div style="font-size:10px;color:#3A3A3A;margin-top:4px;font-style:italic">"'+esc(w.notes)+'"</div>':'')+'</div><div class="bb" style="font-size:20px;color:#FF6B35">+'+w.xpGained+'</div></div></div>';
    }
  }
  html+='</div>';
  return html;
}

function statCmp(label, cur, prev, unit){
  var diff=cur-prev;
  var arrow=diff>0?'▲':diff<0?'▼':'–';
  var col=diff>0?'#6FCF97':diff<0?'#FF6B35':'#555';
  return '<div style="text-align:center"><div class="bb" style="font-size:20px;color:#fff;line-height:1">'+cur+unit+'</div><div class="bc" style="font-size:9px;color:'+col+';margin-top:3px">'+arrow+' '+(diff!==0?Math.abs(diff)+unit:'=')+'</div><div class="bc" style="font-size:8px;color:#333;margin-top:2px;letter-spacing:1px">'+label+'</div></div>';
}

function renderCharts(){
  var xpD=db.workouts.slice(0,10).reverse();
  var xpc=document.getElementById('xp-chart');
  if(xpc){
    if(xpD.length<2){xpc.innerHTML='<div class="bc" style="font-size:11px;color:#333;padding:10px">Pas encore assez de données</div>';}
    else{
      var mx=1; for(var i=0;i<xpD.length;i++) if(xpD[i].xpGained>mx) mx=xpD[i].xpGained;
      var h=''; for(var i=0;i<xpD.length;i++){var ht=Math.max(4,Math.round((xpD[i].xpGained/mx)*70));var d=new Date(xpD[i].date).toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit'});h+='<div style="display:flex;flex-direction:column;align-items:center;gap:4px;flex:1"><div style="width:100%;background:#FF6B35;border-radius:3px 3px 0 0;height:'+ht+'px"></div><div class="clabel">'+d+'</div></div>';}
      xpc.innerHTML=h;
    }
  }
  var wD=db.weights.slice(0,10).reverse();
  var wc=document.getElementById('w-chart');
  if(wc){
    if(wD.length<2){wc.innerHTML='<div class="bc" style="font-size:11px;color:#333;padding:10px">Log ton poids depuis l\'accueil</div>';}
    else{
      var vals=wD.map(function(x){return x.weight;}),minV=Math.min.apply(null,vals)-0.5,maxV=Math.max.apply(null,[].concat(vals).concat([PROFILE.goalWeight]))+0.5;
      var h=''; for(var i=0;i<wD.length;i++){var ht=Math.max(4,Math.round(((wD[i].weight-minV)/(maxV-minV))*70));var d=new Date(wD[i].date).toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit'});h+='<div style="display:flex;flex-direction:column;align-items:center;gap:4px;flex:1"><div style="width:100%;background:#4ECDC4;border-radius:3px 3px 0 0;height:'+ht+'px"></div><div class="clabel">'+d+'</div></div>';}
      wc.innerHTML=h;
    }
  }
  var exmap={};
  for(var wi=0;wi<db.workouts.length;wi++){var w=db.workouts[wi];for(var ei=0;ei<w.exercises.length;ei++){var ex=w.exercises[ei];if(!exmap[ex.n])exmap[ex.n]=[];var mx2=0;for(var si=0;si<ex.sets.length;si++) if((ex.sets[si].w||0)>mx2) mx2=ex.sets[si].w||0;exmap[ex.n].push({d:new Date(w.date).toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit'}),v:mx2});}}
  var exnames=Object.keys(exmap).filter(function(n){return exmap[n].length>=2;});
  var fe=document.getElementById('ex-filter');
  if(fe){
    var fh='';
    for(var ni=0;ni<exnames.length;ni++){var nm=exnames[ni],short=nm.split(' ').slice(0,2).join(' '),active=statEx===nm;fh+='<button onclick="selStatEx(\''+nm.replace(/\\/g,'\\\\').replace(/'/g,"\\'")+'\') " style="background:'+(active?'#FF6B35':'#181818')+';color:'+(active?'#080808':'#555')+';border:1px solid '+(active?'#FF6B35':'#252525')+';border-radius:4px;padding:5px 10px;font-family:Barlow Condensed,sans-serif;font-size:10px;cursor:pointer;margin:2px">'+esc(short)+'</button>';}
    fe.innerHTML=fh;
  }
  var pc=document.getElementById('prog-chart');
  if(pc){
    if(statEx&&exmap[statEx]&&exmap[statEx].length>=2){
      var pd=exmap[statEx].slice(0,10).reverse(),pmx=1;
      for(var pi=0;pi<pd.length;pi++) if(pd[pi].v>pmx) pmx=pd[pi].v;
      var ph=''; for(var pi=0;pi<pd.length;pi++){var ht=Math.max(4,Math.round((pd[pi].v/pmx)*60));ph+='<div style="display:flex;flex-direction:column;align-items:center;gap:4px;flex:1"><div style="width:100%;background:#FF6B35;border-radius:3px 3px 0 0;height:'+ht+'px"></div><div class="clabel">'+pd[pi].d+'</div></div>';}
      pc.innerHTML=ph;
    } else { pc.innerHTML='<div class="bc" style="font-size:11px;color:#333;padding:10px">Sélectionne un exercice</div>'; }
  }
}
function selStatEx(name){statEx=statEx===name?null:name;renderCharts();}

// ═══════════════════════════════════════════════════════════
// PROGRAMME
// ═══════════════════════════════════════════════════════════
function renderProgram(){
  var DD=["LUN","MAR","MER","JEU","VEN","SAM","DIM"];
  var SC=[
    {label:"PUSH",        color:"#FF6B35", focus:"Pec · Épaules · Triceps"},
    {label:"PULL",        color:"#4ECDC4", focus:"Dos · Biceps · Trapèzes"},
    {label:"LEGS",        color:"#FFE66D", focus:"Quadri · Ischio · Fessiers"},
    {label:"CARDIO MATIN", color:"#38BDF8", focus:"Marche · Escalier · Course · 60 min enchaîné"},
    null,
    {label:"CARDIO GR",   color:"#6FCF97", focus:"Marche inclinée · Prépa randonnée"},
    null
  ];
  var grDays=Math.ceil((GR_DATE-new Date())/86400000);
  var grPhase, grTip;
  if(grDays>56){grPhase='PHASE 1';grTip='30 min · Inclinaison 6-8% · Sans sac';}
  else if(grDays>28){grPhase='PHASE 2';grTip='45 min · Inclinaison 8-10% · Sac 5 kg';}
  else if(grDays>14){grPhase='PHASE 3';grTip='60 min · Inclinaison 10-12% · Sac 8-10 kg';}
  else{grPhase='AFFÛTAGE';grTip='30 min léger · Repos et préparation finale';}

  var weekH='<div style="display:flex;gap:4px;margin-bottom:18px">';
  for(var i=0;i<7;i++){
    var s=SC[i];
    weekH+='<div style="flex:1;text-align:center"><div class="bc" style="font-size:9px;color:#2A2A2A;letter-spacing:1px;margin-bottom:4px">'+DD[i]+'</div>';
    if(s){weekH+='<div onclick="togDay('+i+')" style="background:'+s.color+'15;border:1px solid '+s.color+'40;border-radius:5px;padding:7px 2px;cursor:pointer;min-height:42px;display:flex;align-items:center;justify-content:center"><div class="bb" style="font-size:9px;color:'+s.color+';line-height:1.2;text-align:center">'+s.label.replace(' + ','\n+')+'</div></div>';}
    else{weekH+='<div style="background:#0E0E0E;border:1px solid #181818;border-radius:5px;padding:7px 2px;min-height:42px;display:flex;align-items:center;justify-content:center"><div class="bb" style="font-size:8px;color:#1E1E1E">REPOS</div></div>';}
    weekH+='</div>';
  }
  weekH+='</div>';

  var detH='';
  if(openDay!==null&&SC[openDay]){
    var sd=SC[openDay];
    detH='<div class="card ai" style="margin-bottom:14px;border-color:'+sd.color+'40"><div class="bb" style="font-size:24px;letter-spacing:3px;color:'+sd.color+';margin-bottom:2px">'+sd.label+'</div><div class="bc" style="font-size:10px;color:#444;letter-spacing:1px;margin-bottom:14px">'+sd.focus+'</div>';
    var exs=SEX[sd.label]||[];
    for(var j=0;j<exs.length;j++){
      var pr=db.prs[exs[j].n]?'<div class="bc" style="font-size:10px;color:#FFE66D;margin-top:2px">🏆 PR: '+db.prs[exs[j].n]+' kg</div>':'';
      var hasTipProg=!!TIPS[exs[j].n];
      detH+='<div style="border-bottom:1px solid #181818;padding:10px 0;display:flex;gap:12px;align-items:flex-start"><div class="bb" style="font-size:15px;color:'+sd.color+';width:22px;flex-shrink:0">'+(j+1)+'</div><div style="flex:1"><div class="bc" style="font-size:14px;color:#ddd;letter-spacing:.3px">'+esc(exs[j].n)+'</div><div style="font-size:11px;color:#3A3A3A;margin-top:2px">'+esc(exs[j].t)+'</div>'+pr+'</div>'+(hasTipProg?'<div class="bc" style="font-size:9px;color:#555;letter-spacing:1px;cursor:pointer;padding:4px;border:1px solid #1C1C1C;border-radius:4px" onclick="showProgTip(\''+exs[j].n.replace(/\\/g,'\\\\').replace(/'/g,"\\'")+'\')" >TIPS</div>':'')+'</div>';
    }
    detH+='</div>';
  }

  // GR prep section
  var grH='<div class="card" style="background:#090E09;border-color:#1A2A1A;margin-bottom:10px">';
  grH+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><div class="bc" style="font-size:9px;color:#6FCF97;letter-spacing:3px">🏔️ PRÉPA GR · MID-AOÛT 2026</div><div class="bb" style="font-size:18px;color:#6FCF97">J-'+grDays+'</div></div>';
  grH+='<div class="bb" style="font-size:18px;color:#fff;letter-spacing:2px;margin-bottom:4px">'+grPhase+'</div>';
  grH+='<div class="bc" style="font-size:12px;color:#6FCF97;margin-bottom:12px">'+grTip+'</div>';
  grH+='<div style="background:#181818;border-radius:2px;height:5px;overflow:hidden;margin-bottom:12px"><div style="height:100%;width:'+Math.max(0,Math.min(100,Math.round((1-grDays/122)*100)))+'%;background:linear-gradient(90deg,#6FCF97,#A8EDEA);border-radius:2px;transition:width .6s ease"></div></div>';
  grH+='<div class="bc" style="font-size:9px;color:#3A3A3A;letter-spacing:2px;margin-bottom:10px">PLAN PROGRESSIF</div>';
  var phases=[
    {p:'Phase 1',when:'Maintenant → 8 sem. avant',tip:'30 min · 6-8% · sans sac',active:grDays>56},
    {p:'Phase 2',when:'8 → 4 sem. avant',tip:'45 min · 8-10% · sac 5 kg',active:grDays<=56&&grDays>28},
    {p:'Phase 3',when:'4 → 2 sem. avant',tip:'60 min · 10-12% · sac 8-10 kg',active:grDays<=28&&grDays>14},
    {p:'Affûtage',when:'2 sem. avant',tip:'30 min léger · repos actif',active:grDays<=14}
  ];
  for(var phi=0;phi<phases.length;phi++){
    var ph=phases[phi];
    grH+='<div style="display:flex;gap:10px;padding:8px 0;border-bottom:1px solid #111;opacity:'+(ph.active?1:.4)+'"><div class="bb" style="font-size:11px;color:#6FCF97;width:70px;flex-shrink:0;letter-spacing:1px">'+(ph.active?'▶ ':'')+ph.p+'</div><div><div style="font-size:12px;color:#ccc">'+ph.tip+'</div><div class="bc" style="font-size:10px;color:#444;margin-top:2px">'+ph.when+'</div></div></div>';
  }
  grH+='</div>';

  // GR checklist
  var grck='<div class="card" style="background:#090E09;border-color:#1A2A1A;margin-bottom:10px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><div class="bc" style="font-size:9px;color:#6FCF97;letter-spacing:3px">ÉQUIPEMENT GR</div><div class="bc" style="font-size:10px;color:#444">'+Object.keys(db.gr_check).filter(function(k){return db.gr_check[k];}).length+'/'+GR_CHECKLIST.length+'</div></div>';
  for(var gi=0;gi<GR_CHECKLIST.length;gi++){
    var it=GR_CHECKLIST[gi], ch=!!db.gr_check[it.id];
    grck+='<div style="display:flex;align-items:center;gap:12px;padding:9px 0;border-bottom:1px solid #111;cursor:pointer" onclick="togGR(\''+it.id+'\')">';
    grck+='<div class="chk'+(ch?' on':'')+'">'+( ch?'<span style="color:#080808;font-size:12px">✓</span>':'')+'</div>';
    grck+='<span class="bc" style="font-size:13px;color:'+(ch?'#6FCF97':'#555')+';letter-spacing:.3px">'+esc(it.t)+'</span></div>';
  }
  grck+='</div>';

  // Conseils
  var tips2=['<div class="card" style="background:#090E09;border-color:#182018;margin-bottom:10px"><div class="bc" style="font-size:9px;color:#6FCF97;letter-spacing:3px;margin-bottom:12px">CONSEILS · STEIL 67→70 KG</div>'];
  var consItems=[["Calories","Surplus +300-400 kcal · ~2650 kcal/jour"],["Protéines","~140 g/jour · Whey + viande + légumineuses"],["Progression","+2.5 kg quand tu maîtrises les reps sur 2 séances"],["Sommeil","8h minimum · La croissance se fait hors de la salle"],["Cardio","Samedi cardio GR + max 1 séance légère suppl."],["Créatine","5g/jour, tous les jours (même sans séance)"],["Oméga-3","2-3g EPA/DHA · Anti-inflammatoire, récup']"]];
  for(var ci2=0;ci2<consItems.length;ci2++) tips2.push('<div style="display:flex;gap:10px;padding:9px 0;border-bottom:1px solid #111"><div class="bb" style="font-size:12px;color:#6FCF97;width:80px;flex-shrink:0;letter-spacing:1px">'+consItems[ci2][0]+'</div><div style="font-size:12px;color:#444;line-height:1.4">'+consItems[ci2][1]+'</div></div>');
  tips2.push('</div>');

  return '<div class="ai" style="padding:24px 14px">'
    +'<div class="bb" style="font-size:34px;letter-spacing:3px;margin-bottom:2px">PROGRAMME</div>'
    +'<div class="bc" style="font-size:10px;color:#444;letter-spacing:2px;margin-bottom:16px">STEIL · MASSE + GR PREP · LUN/MAR/MER/JEU/SAM</div>'
    +weekH+detH+grH+grck+tips2.join('')
    +'</div>';
}

function togDay(i){openDay=openDay===i?null:i;render();}
function togGR(id){db.gr_check[id]=!db.gr_check[id];saveDB();render();}
function showProgTip(exName){
  var tip=TIPS[exName]; if(!tip)return;
  document.getElementById('tips-inner').innerHTML='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px"><div class="bb" style="font-size:18px;letter-spacing:2px">'+esc(exName)+'</div><button onclick="closeTips()" style="background:none;border:none;color:#666;cursor:pointer;font-size:22px">✕</button></div><div style="margin-bottom:12px"><div class="bc" style="font-size:9px;color:#FF6B35;letter-spacing:3px;margin-bottom:6px">MUSCLES CIBLÉS</div><div style="font-size:13px;color:#ccc">'+esc(tip.m)+'</div></div><div style="margin-bottom:12px"><div class="bc" style="font-size:9px;color:#4ECDC4;letter-spacing:3px;margin-bottom:6px">EXÉCUTION</div><div style="font-size:13px;color:#ccc;line-height:1.5">'+esc(tip.e)+'</div></div><div style="margin-bottom:12px"><div class="bc" style="font-size:9px;color:#FFE66D;letter-spacing:3px;margin-bottom:6px">ERREURS FRÉQUENTES</div><div style="font-size:13px;color:#888;line-height:1.5">'+esc(tip.err)+'</div></div><div><div class="bc" style="font-size:9px;color:#6FCF97;letter-spacing:3px;margin-bottom:6px">PROGRESSION</div><div style="font-size:13px;color:#6FCF97;line-height:1.5">'+esc(tip.p)+'</div></div>';
  document.getElementById('tips-pop').classList.add('open');
}

// ═══════════════════════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════════════════════
var toastTm=null;
function showToast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');if(toastTm)clearTimeout(toastTm);toastTm=setTimeout(function(){t.classList.remove('show');},3000);}

// ═══════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════
render();
</script>
